<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 발표자 뽑기</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Jua (귀여운 학교 칠판/분필 느낌의 폰트) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti (폭죽 효과 라이브러리) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Jua', sans-serif;
            background-color: #fdfbf7; /* 따뜻한 종이 질감 색상 */
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .slot-machine-text {
            /* 텍스트가 빠르게 바뀔 때 약간의 블러 효과를 주어 역동성을 더함 */
            filter: blur(0px);
            transition: filter 0.1s ease-in-out;
        }
        
        .is-shuffling {
            filter: blur(2px);
            color: #9ca3af;
        }

        /* 스크롤바 꾸미기 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c7d2fe; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #818cf8; 
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex items-center justify-center text-gray-800">

    <div class="max-w-5xl w-full mx-auto bg-white/90 backdrop-blur-sm shadow-2xl rounded-3xl p-6 md:p-10 border-4 border-indigo-100">
        
        <!-- 헤더 -->
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl text-indigo-600 font-bold tracking-wider mb-2">🎉 우리반 발표자 뽑기 🏫</h1>
            <p class="text-gray-500 text-lg">긴장되는 순간! 과연 오늘의 발표자는 누구일까요?</p>
        </header>

        <!-- 메인 레이아웃: 2단 그리드 (모바일에서는 1단) -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
            
            <!-- 왼쪽 패널: 명단 설정 -->
            <div class="md:col-span-4 flex flex-col space-y-4">
                <div class="bg-indigo-50 p-5 rounded-2xl border-2 border-indigo-100 h-full flex flex-col">
                    <h2 class="text-2xl text-indigo-800 mb-3 flex items-center gap-2">
                        <span>📝</span> 명단 입력
                    </h2>
                    <p class="text-sm text-gray-600 mb-3 leading-tight">
                        학생 이름을 쉼표(,)나 줄바꿈으로 구분해서 적어주세요.
                    </p>
                    <textarea id="nameInput" class="w-full flex-grow p-3 rounded-xl border-2 border-indigo-200 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-100 resize-none text-lg text-gray-700 bg-white shadow-inner mb-4" placeholder="예) 유재석, 강호동, 신동엽, 이효리..."></textarea>
                    
                    <button id="saveBtn" class="w-full bg-indigo-500 hover:bg-indigo-600 active:bg-indigo-700 text-white text-xl py-3 rounded-xl transition-all duration-200 transform hover:scale-[1.02] active:scale-95 shadow-md">
                        명단 저장 / 초기화
                    </button>
                </div>
            </div>

            <!-- 오른쪽 패널: 뽑기 화면 및 현황 -->
            <div class="md:col-span-8 flex flex-col space-y-6">
                
                <!-- 메인 뽑기 화면 -->
                <div class="bg-gradient-to-br from-yellow-50 to-orange-50 border-4 border-yellow-200 p-8 rounded-3xl text-center shadow-lg relative overflow-hidden flex flex-col items-center justify-center min-h-[300px]">
                    <div class="absolute top-4 left-4 text-yellow-600 text-lg opacity-70">Lucky Draw!</div>
                    
                    <!-- 결과 텍스트 -->
                    <div id="resultDisplay" class="text-6xl md:text-8xl font-bold text-indigo-700 my-8 min-h-[120px] flex items-center justify-center drop-shadow-sm slot-machine-text">
                        대기 중...
                    </div>
                    
                    <!-- 뽑기 버튼 영역 -->
                    <div class="flex flex-col sm:flex-row gap-4 justify-center w-full max-w-md mx-auto">
                        <button id="drawBtn" class="flex-1 bg-yellow-400 hover:bg-yellow-500 active:bg-yellow-600 text-yellow-900 text-2xl md:text-3xl px-6 py-4 rounded-full transition-all duration-300 transform hover:-translate-y-1 hover:shadow-xl active:translate-y-1 active:shadow-sm border-b-4 border-yellow-600 hover:border-yellow-700">
                            🎁 한 명 뽑기
                        </button>
                        <button id="relayBtn" class="flex-1 bg-blue-400 hover:bg-blue-500 active:bg-blue-600 text-blue-900 text-2xl md:text-3xl px-6 py-4 rounded-full transition-all duration-300 transform hover:-translate-y-1 hover:shadow-xl active:translate-y-1 active:shadow-sm border-b-4 border-blue-600 hover:border-blue-700">
                            🚀 릴레이 뽑기
                        </button>
                    </div>
                </div>

                <!-- 명단 현황 (남은 사람 vs 뽑힌 사람) -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- 남은 학생 -->
                    <div class="bg-green-50 p-4 rounded-2xl border-2 border-green-100 shadow-sm">
                        <h3 class="text-xl text-green-800 mb-2 border-b-2 border-green-200 pb-2 flex justify-between">
                            <span>🌱 남은 학생</span>
                            <span id="remainCount" class="bg-green-200 px-2 rounded-full text-green-900">0</span>
                        </h3>
                        <div id="remainList" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto pt-2">
                            <span class="text-gray-400 text-sm">명단을 입력해주세요.</span>
                        </div>
                    </div>
                    
                    <!-- 뽑힌 학생 -->
                    <div class="bg-rose-50 p-4 rounded-2xl border-2 border-rose-100 shadow-sm">
                        <h3 class="text-xl text-rose-800 mb-2 border-b-2 border-rose-200 pb-2 flex justify-between">
                            <span>🎯 뽑힌 학생</span>
                            <span id="pickedCount" class="bg-rose-200 px-2 rounded-full text-rose-900">0</span>
                        </h3>
                        <div id="pickedList" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto pt-2">
                            <span class="text-gray-400 text-sm">아직 없습니다.</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // 상태 관리 변수들
        let remainingStudents = [];
        let pickedStudents = [];
        let isDrawing = false;
        let isRelayMode = false;
        let relayTimeout = null;
        
        // 오디오 컨텍스트 (효과음용)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // DOM 요소 가져오기
        const nameInputEl = document.getElementById('nameInput');
        const saveBtn = document.getElementById('saveBtn');
        const drawBtn = document.getElementById('drawBtn');
        const resultDisplay = document.getElementById('resultDisplay');
        const remainCountEl = document.getElementById('remainCount');
        const remainListEl = document.getElementById('remainList');
        const pickedCountEl = document.getElementById('pickedCount');
        const pickedListEl = document.getElementById('pickedList');
        const relayBtn = document.getElementById('relayBtn');

        // 기본 데모 명단 셋업
        const defaultNames = "김철수, 이영희, 박지민, 최수아, 정윤호, 강태현, 조은지, 윤서준, 임하늘, 한지훈, 오세훈, 서지우";
        nameInputEl.value = defaultNames;

        // 1. 명단 저장 및 초기화 함수
        function saveAndInitList() {
            // 릴레이 중이었다면 중지
            if (typeof stopRelay === 'function') stopRelay();

            const inputText = nameInputEl.value;
            if (!inputText.trim()) {
                resultDisplay.textContent = "명단을 입력하세요!";
                resultDisplay.classList.replace('text-indigo-700', 'text-rose-500');
                resultDisplay.classList.replace('text-6xl', 'text-4xl');
                return;
            }

            // 쉼표나 줄바꿈으로 분리 후 공백 제거, 빈 문자열 필터링, 중복 제거
            const parsedNames = inputText.split(/[\n,]+/)
                                         .map(name => name.trim())
                                         .filter(name => name.length > 0);
            
            remainingStudents = [...new Set(parsedNames)]; // 중복 이름 1차 제거
            pickedStudents = [];
            
            // 스타일 초기화
            resultDisplay.textContent = "대기 중...";
            resultDisplay.classList.replace('text-rose-500', 'text-indigo-700');
            resultDisplay.classList.replace('text-4xl', 'text-6xl');
            
            updateUI();
        }

        // 2. 화면(UI) 업데이트 함수
        function updateUI() {
            // 카운트 업데이트
            remainCountEl.textContent = remainingStudents.length;
            pickedCountEl.textContent = pickedStudents.length;

            // 남은 학생 리스트 렌더링
            if (remainingStudents.length > 0) {
                remainListEl.innerHTML = remainingStudents.map(name => 
                    `<span class="bg-white border border-green-200 text-green-700 px-2 py-1 rounded-md text-sm shadow-sm">${name}</span>`
                ).join('');
            } else {
                remainListEl.innerHTML = `<span class="text-gray-400 text-sm">남은 학생이 없습니다.</span>`;
            }

            // 뽑힌 학생 리스트 렌더링
            if (pickedStudents.length > 0) {
                pickedListEl.innerHTML = pickedStudents.map(name => 
                    `<span class="bg-rose-500 text-white px-2 py-1 rounded-md text-sm shadow-sm line-through opacity-80">${name}</span>`
                ).join('');
            } else {
                pickedListEl.innerHTML = `<span class="text-gray-400 text-sm">아직 없습니다.</span>`;
            }
        }

        // 3. 폭죽 효과 애니메이션
        function fireConfetti() {
            const duration = 2000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#818cf8', '#fbbf24', '#fb7185']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#818cf8', '#fbbf24', '#fb7185']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // 효과음 재생 함수들 (브라우저 내장 Web Audio API 사용)
        function playTickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.05);
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playTadaSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const playNote = (freq, startTime, duration) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.15, startTime);
                gain.gain.linearRampToValueAtTime(0, startTime + duration);
                osc.start(startTime);
                osc.stop(startTime + duration);
            };

            const now = audioCtx.currentTime;
            // 짧은 화음 (따-)
            playNote(440, now, 0.1); 
            playNote(554.37, now, 0.1); 
            playNote(659.25, now, 0.1); 
            // 긴 화음 (-단!)
            playNote(440, now + 0.15, 0.8); 
            playNote(554.37, now + 0.15, 0.8); 
            playNote(659.25, now + 0.15, 0.8); 
            playNote(880, now + 0.15, 0.8); 
        }

        // 4. 뽑기 실행 함수
        function startDraw() {
            if (isDrawing) return; // 이미 뽑는 중이면 무시
            
            if (audioCtx.state === 'suspended') audioCtx.resume(); // 오디오 활성화

            if (remainingStudents.length === 0) {
                resultDisplay.textContent = "끝났습니다!";
                resultDisplay.classList.replace('text-indigo-700', 'text-rose-500');
                if(isRelayMode) stopRelay();
                return;
            }

            isDrawing = true;
            drawBtn.disabled = true;
            drawBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            if(!isRelayMode) {
                drawBtn.textContent = "고르는 중...";
            }
            
            resultDisplay.classList.replace('text-rose-500', 'text-indigo-700');
            resultDisplay.classList.add('is-shuffling');

            // 셔플 애니메이션 효과 (이름이 빠르게 바뀜)
            let shuffleCount = 0;
            const maxShuffles = 20; // 20번 이름이 바뀐 후 멈춤
            
            const shuffleInterval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * remainingStudents.length);
                resultDisplay.textContent = remainingStudents[randomIndex];
                shuffleCount++;
                
                playTickSound(); // 틱틱틱 효과음

                if (shuffleCount >= maxShuffles) {
                    clearInterval(shuffleInterval);
                    finishDraw();
                }
            }, 80); // 0.08초마다 바뀜
        }

        // 5. 뽑기 완료 처리 함수
        function finishDraw() {
            // 진짜 당첨자 추첨
            const winnerIndex = Math.floor(Math.random() * remainingStudents.length);
            const winner = remainingStudents[winnerIndex];

            // 명단 이동 (남은 배열에서 제거, 뽑힌 배열에 추가)
            remainingStudents.splice(winnerIndex, 1);
            pickedStudents.push(winner);

            // UI 업데이트
            resultDisplay.classList.remove('is-shuffling');
            resultDisplay.textContent = `🎉 ${winner} 🎉`;
            
            playTadaSound(); // 짠! 효과음
            fireConfetti(); // 폭죽 발사!
            updateUI();     // 하단 명단 업데이트

            // 상태 복구
            isDrawing = false;
            
            // 릴레이 모드 처리
            if (isRelayMode) {
                if (remainingStudents.length > 0) {
                    // 1.5초 대기 후 다음 릴레이 자동 시작
                    relayTimeout = setTimeout(startDraw, 1500);
                } else {
                    stopRelay(); // 더 이상 뽑을 사람이 없으면 중지
                }
            } else {
                drawBtn.disabled = false;
                drawBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                drawBtn.innerHTML = "🎁 한 명 뽑기";
            }
        }

        // 6. 릴레이 기능 토글 함수
        function toggleRelay() {
            if (isRelayMode) {
                stopRelay(); // 켜져 있으면 끄기
            } else {
                // 켜기
                if (remainingStudents.length === 0) {
                    resultDisplay.textContent = "명단이 없습니다!";
                    resultDisplay.classList.replace('text-indigo-700', 'text-rose-500');
                    return;
                }
                isRelayMode = true;
                relayBtn.innerHTML = "⏹ 릴레이 멈춤";
                relayBtn.classList.replace('bg-blue-400', 'bg-red-400');
                relayBtn.classList.replace('hover:bg-blue-500', 'hover:bg-red-500');
                relayBtn.classList.replace('border-blue-600', 'border-red-600');
                
                drawBtn.disabled = true;
                drawBtn.classList.add('opacity-50', 'cursor-not-allowed');
                
                startDraw();
            }
        }

        function stopRelay() {
            isRelayMode = false;
            clearTimeout(relayTimeout);
            relayBtn.innerHTML = "🚀 릴레이 뽑기";
            relayBtn.classList.replace('bg-red-400', 'bg-blue-400');
            relayBtn.classList.replace('hover:bg-red-500', 'hover:bg-blue-500');
            relayBtn.classList.replace('border-red-600', 'border-blue-600');
            
            if (!isDrawing) {
                drawBtn.disabled = false;
                drawBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                drawBtn.innerHTML = "🎁 한 명 뽑기";
            }
        }

        // 이벤트 리스너 등록
        saveBtn.addEventListener('click', saveAndInitList);
        drawBtn.addEventListener('click', startDraw);
        relayBtn.addEventListener('click', toggleRelay);

        // 최초 실행 시 명단 셋업
        saveAndInitList();

    </script>
</body>
</html>
